<!doctype html>
<html>
    <script>
        const STORAGE_SUFFIX = "PBL";

        const storage = {
            getItem: (key) => localStorage.getItem(key + STORAGE_SUFFIX),
            setItem: (key, value) =>
                localStorage.setItem(key + STORAGE_SUFFIX, value),
            removeItem: (key) => localStorage.removeItem(key + STORAGE_SUFFIX),
        };

        document.addEventListener("DOMContentLoaded", () => {
            const downloadEl = document.getElementById("downloaddata");
            downloadEl.addEventListener("click", () => {
                const data = JSON.stringify({
                    settingsPBL: storage.getItem("settings"),
                    selectedPBL: storage.getItem("selected"),
                    userListsPBL: storage.getItem("userLists"),
                });
                const blob = new Blob([data], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "PBLTrainerData.json";
                a.click();
                URL.revokeObjectURL(url);
            });
        });
    </script>
    <style>
        html {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            background-color: #181818;
            color: #ffffff;
        }

        .button {
            all: unset;
            display: inline-block;
            padding: 0.5em 1em;
            border: 2px solid black;
            background-color: #333333;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            border-color: #666666;
        }

        .button:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }
    </style>
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Website moved</title>

        <!-- for upload/download icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
        />
    </head>

    <body>
        <a class="button" href="https://squan-trainers.web.app/"
            >Access trainers
        </a>
        <button class="button" id="downloaddata">
            <i class="fa fa-download"></i> Download old data
        </button>
    </body>
</html>
