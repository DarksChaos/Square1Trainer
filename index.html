<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>PBL Trainer</title>
    <link rel="stylesheet" href="css/index.css" />
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@800&display=swap" rel="stylesheet" />


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="data/generic-data.js"></script>
    <script src="data/obl-data.js"></script>
    <script src="data/pbl-data.js"></script>
    <script src="script/utils.js"></script>
    <script src="script/pbl-filter.js"></script>
    <script src="script/karn.js"></script>
    <script src="script/optimizer.js"></script>


    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    <script>
        if ('serviceWorker' in navigator) {
            let refreshing = false;

            // Detect when a new service worker is waiting
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    console.log('[SW] New service worker activated, reloading page');
                    window.location.reload();
                }
            });

            navigator.serviceWorker.register('/serviceworker.js')
                .then((registration) => {
                    console.log('[SW] Service Worker registered:', registration);

                    // Check for updates periodically
                    setInterval(() => {
                        registration.update();
                    }, 60000); // Check every minute

                    // If there's an update waiting, activate it
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        console.log('[SW] New service worker found');

                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('[SW] New service worker installed, will activate on next page load');
                                // Optionally show a notification to the user
                                // You could add a banner here saying "Update available, please refresh"
                            }
                        });
                    });
                })
                .catch((error) => {
                    console.error('[SW] Service Worker registration failed:', error);
                });
        }
    </script>
</head>

<body>
    <div class="navbar">
        <div class="nav-left">
            <span class="squango" onclick="location.href='https://squan-trainers.web.app/'"><span class="squango-sq">Squan</span><span class="squango-go">Go</span></span>
            <div class="nav-divider"></div>
            <button id="toggleui">Toggle selector</button>
        </div>
        <div class="nav-center" id="mode-title" style="cursor:pointer;user-select:none;"></div>
        <div class="nav-right">
            <button id="open-help">?</button>
            <button id="open-settings">&#9881;</button>
        </div>
        <input type="file" id="fileinput" style="display: none" accept=".json" />
    </div>

        <div id="cluster-modal" class="cluster-overlay"
            style="display:none;" onclick="closeCluster(event)">
            <div id="cluster-modal-inner" class="cluster-window" onclick="event.stopPropagation()">
                <div class="cluster-header">
                    <span class="cluster-window-title">Alg reference</span>
                    <button class="cluster-close-btn" onclick="closeCluster()">✕</button>
                </div>
                <div id="cluster-modal-content" class="cluster-text"></div>
            </div>
        </div>

    <div class="main">
        <div class="popup" id="settings-popup">
            <div class="popup-inner settings-popup-inner">
                <div class="list-bar">
                    <div class="list-name">Settings</div>
                    <div class="cross">&#10005;</div>
                </div>
                <div class="settings-body">
                    <label class="settings-row settings-checkbox">
                        <input type="checkbox" id="karn" />
                        <span>Use karnotation <b>(K)</b></span>
                    </label>
                    <label class="settings-row settings-checkbox">
                        <input type="checkbox" id="weight" />
                        <span>Use realistic weights <b>(R)</b></span>
                    </label>
                    <label class="settings-row settings-checkbox">
                        <input type="checkbox" id="usebarflip" />
                        <span>Distinguish between + and - barflip <b>(B)</b></span>
                    </label>
                    <label class="settings-row settings-checkbox" id="globalbarfliprow">
                        <input type="checkbox" id="globalbarflip" />
                        <span>Show global barflip override <b>(G)</b></span>
                    </label>
                    <label class="settings-row settings-checkbox" id="bottom56-row" style="display:none">
                        <input type="checkbox" id="allow-bottom56" />
                        <span>Allow bottom 5s and 6s</span>
                    </label>
                    <label class="settings-row settings-checkbox" id="specific-row" style="display:none">
                        <input type="checkbox" id="specific" />
                        <span>Use specific case naming <b>(S)</b></span>
                    </label>
                    <label class="settings-row settings-checkbox" id="oblp-row" style="display:none">
                        <input type="checkbox" id="oblp" />
                        <span>Show Matt tracing memo <b>(P)</b></span>
                    </label>
                    <div class="settings-row" id="scramble-length-row">
                        <span>Scramble length:</span>
                        <div class="equator-options">
                            <label><input type="radio" name="scramlen" value="long" checked /> Long</label>
                            <label><input type="radio" name="scramlen" value="medium" /> Medium</label>
                            <label><input type="radio" name="scramlen" value="short" /> Short</label>
                        </div>
                    </div>
                    <hr class="settings-divider" />
                    <button class="settings-action-btn" id="uploaddata">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:7px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload data
                    </button>
                    <button class="settings-action-btn" id="downloaddata">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:7px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download data
                    </button>
                </div>
            </div>
        </div>

        <div class="popup" id="list-popup">
            <div class="popup-inner">
                <div class="list-bar">
                    <div class="list-name">Manage lists</div>
                    <div class="cross">&#10005;</div>
                </div>
                <div class="list-menu" id="list-menu">
                    <div class="sublist-name">Default lists</div>
                    <div id="defaultlists" class="sublist-menu"></div>
                    <div class="sublist-name">Your lists</div>
                    <div id="userlists" class="sublist-menu"></div>
                </div>
                <div class="list-buttons">
                    <div class="list-btn-group">
                        <button class="list-btn" id="dellist">Delete</button>
                        <button class="list-btn" id="overwritelist">Overwrite</button>
                    </div>
                    <div class="list-btn-group list-btn-group-right">
                        <button class="list-btn" id="sellist">View</button>
                        <button class="list-btn" id="trainlist">Select</button>
                        <button class="list-btn" id="newlist">Create New list</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="popup" id="help-popup">
            <div class="popup-inner help-popup-inner">
                <div class="list-bar">
                    <div class="list-name">Help</div>
                    <div class="cross">&#10005;</div>
                </div>
                <div class="help-layout">
                    <nav class="help-nav" id="help-nav"></nav>
                    <div class="help-content" id="help-content"></div>
                </div>
            </div>
        </div>

        <div class="sidebar hidden-mobile" id="sidebar">
            <div class="checkbox-wrapper hidden-mobile">
                <input type="checkbox" id="allcases" />
                <span class="checkboxtext"><b>Go through each case once (E)</b></span>
            </div>
            <div class="barflip-override-row hidden" id="barflip-override-row">
                <span class="barflip-override-label">Global barflip override:</span>
                <div class="barflip-toggle">
                    <button class="barflip-toggle-btn" id="barflip-flipped">Flipped</button>
                    <div class="barflip-sep"></div>
                    <button class="barflip-toggle-btn" id="barflip-solved">Solved</button>
                </div>
            </div>
            <input type="text" class="filter-input" id="pbl-filter" maxlength="25" autocomplete="new-pbl-filter"
                placeholder='Filter cases (Ctrl+F)' />
            <p class="selection-text" id="selcount">Selected: -</p>
            <div class="selection-grid">
                <button class="selection-btn" id="sela">Select ALL</button>
                <button class="selection-btn" id="desela">Deselect ALL</button>
                <button class="selection-btn" id="showtoggle">Showing: all</button>
                <button class="selection-btn" id="openlists">Select list</button>
            </div>
            <div class="pbl-grid" id="results">
                <!-- Cases -->
            </div>
        </div>

        <div class="content" id="content">
            <div class="top-bar">
                <div class="bar-scramble" id="cur-scram">
                    Scramble will show up here
                </div>
                <div style="margin-top: 10px">
                    <button class="bar-btn" id="prev">← Previous</button>
                            <button class="bar-btn" id="unselprev">
                                Remove last
                            </button>
                            <button class="bar-btn" id="next">Next →</button>
                </div>
            </div>

            <div class="timer-box" id="timerbox">
                <div class="timer-display" id="timer">--:--</div>
            </div>

            <div class="bottom-bar">
                <div class="bar-scramble" id="prev-scram" style="cursor:pointer;">
                    Last scramble will show up here
                </div>
            </div>
        </div>
    </div>
    <div id="success-toast" class="success-toast" style="display:none;">
        <div class="success-box">
            <svg class="success-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2.25C6.61522 2.25 2.25 6.61522 2.25 12C2.25 17.3848 6.61522 21.75 12 21.75C17.3848 21.75 21.75 17.3848 21.75 12C21.75 6.61522 17.3848 2.25 12 2.25ZM16.5303 9.96967C16.8232 10.2626 16.8232 10.7374 16.5303 11.0303L11.5303 16.0303C11.2374 16.3232 10.7626 16.3232 10.4697 16.0303L7.46967 13.0303C7.17678 12.7374 7.17678 12.2626 7.46967 11.9697C7.76256 11.6768 8.23744 11.6768 8.53033 11.9697L11 14.4393L15.4697 9.96967C15.7626 9.67678 16.2374 9.67678 16.5303 9.96967Z" fill="var(--success-toast-inner)"/>
            </svg>
            <span class="success-message" id="success-message">Done!</span>
        </div>
    </div>
    <div id="loading-overlay" class="loading-overlay" style="display:none;">
        <div class="loading-box">
            <div class="loading-spinner"></div>
            <div class="loading-message" id="loading-message">Loading...</div>
        </div>
    </div>
</body>

    <script src="script/generic.js"></script>
    <script src="script/obl-core.js"></script>
    <script src="script/pbl-core.js"></script>

</html>
