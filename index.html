<!doctype html>
<html>
    <script>
        const STORAGE_SUFFIX = "PBL";

        const storage = {
            getItem: (key) => localStorage.getItem(key + STORAGE_SUFFIX),
            setItem: (key, value) =>
                localStorage.setItem(key + STORAGE_SUFFIX, value),
            removeItem: (key) => localStorage.removeItem(key + STORAGE_SUFFIX),
        };

        document.addEventListener("DOMContentLoaded", () => {
            const downloadEl = document.getElementById("downloaddata");
            downloadEl.addEventListener("click", () => {
                const data = JSON.stringify({
                    settingsPBL: storage.getItem("settings"),
                    selectedPBL: storage.getItem("selected"),
                    userListsPBL: storage.getItem("userLists"),
                });
                const blob = new Blob([data], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "PBLTrainerData.json";
                a.click();
                URL.revokeObjectURL(url);
            });
        });
    </script>
    <style>
        html, body {
            font-family: Arial, sans-serif;
            height: 100%;
            background-color: #272020;
            color: #ffffff;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        div {
            display: flex;
            flex-direction: column;
            min-width: 30%;
            text-align: center;
        }

        .button {
            all: unset;
            margin: 3px;
            display: inline-block;
            padding: 1em;
            border: 3px solid #b08b8b;
            border-radius: 10px;
            background-color: #4f3737;
            cursor: pointer;
            text-align: center;
        }

        .button:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }
    </style>
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Website moved</title>

        <!-- for upload/download icons -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
        />
    </head>

    <body>
        <div>
            <p>
                This used to be the PBL trainer until it was moved to a different URL.
                You can download your old data here.
            </p>
            <a class="button" href="https://squan-trainers.web.app/"
                >Access trainers
            </a>
            <button class="button" id="downloaddata">
                <i class="fa fa-download"></i> Download old data
            </button>
        </div>
    </body>
</html>
